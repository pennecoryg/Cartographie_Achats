<!DOCTYPE html>
<html lang="fr">

<!------------------------------------------------------------------->
<!------------------------------------------------------------------->

<head>
  <meta charset="UTF-8">
  <title>Cartographie achat</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<!------------------------------------------------------------------->
<!------------------------------------------------------------------->

<body>

<!---------------------------------------------------------------------->
<!------------------------------Titre page------------------------------>
<!---------------------------------------------------------------------->

<div id="header">
  <img src="logo.png" alt="Logo" id="logo">
  <h1>Cartographie achat</h1>
</div>

<div id="secondeLigne"></div>

<div id = "contenu">
  <!------------------------------------------------------------------------------------>
  <!-----------------------------------Ligne filtrage----------------------------------->
  <!------------------------------------------------------------------------------------>

    <div id ="ligneRecherche">
        <p>Rechercher :</p>
        <div id="toolbarFournisseur">
          <label>
            Fournisseur :
            <input type="text" id="inputFournisseur" list="fournisseursList" autocomplete="off">
            <datalist id="fournisseursList"></datalist>
          </label>
        </div>

        <div id="toolbarMarque">
          <label>
            Marque :
            <input type="text" id="inputMarque" list="marquesList" autocomplete="off">
            <datalist id="marquesList"></datalist>
          </label>
        </div>

        <div id = "toolbarFamille">
          <label>
            Famille :
            <input type="text" id="inputFamille" list="famillesList" autocomplete="off">
            <datalist id="famillesList"></datalist>
          </label>

        </div>

        <div id = "toolbarStatut">
          <label>
            Statut :
            <input type="text" id="inputStatut" list="statutsList" autocomplete="off">
            <datalist id="statutsList"></datalist>
          </label>

        </div>

        <input type="button" id="btnValider" value="Valider">      
        <input type="button" id="btnEffacer" value="Effacer">
        
        
    </div>

  <!----------------------------------------------------------------------------------->
  <!-----------------------------------Ligne tableau----------------------------------->
  <!----------------------------------------------------------------------------------->
  <div id="tableauWrapper">
    <!-- Tableau des résultats -->
    <table id="Tableau" border="1" >
      <thead>
        <tr>
          <th>Fournisseur</th>
          <th>Dénomination X3</th>
          <th>Marque</th>
          <th>Famille</th>
          <th>Activité</th>
          <th>Devise</th>
          <th>Lien webshop</th>
          <th>Sous contrat ?</th>
          <th>Top orygamy</th>
          <th>Priorité</th>
        </tr>
      </thead>
      <tbody id="resultsTableau">
        <!-- Les lignes seront ajoutées dynamiquement par JS -->
      </tbody>
    </table>
  </div>
</div>
<!------Liaison à JS à la fin parce que sinon JS connaitra pas toutes les variables------>

<script src="script.js"></script>
</body>



</html>
